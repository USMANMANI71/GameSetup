<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>444.GAME - Casino</title>
    <style>
        body {
            background-color: #0b2e21;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding-bottom: 70px; /* نیچے کے بار کے لیے جگہ */
        }
        .header {
            background: #062319;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #144632;
        }
        .logo {
            font-size: 20px;
            font-weight: bold;
            color: #2ecc71;
        }
        .auth-btns button {
            border: none;
            padding: 7px 14px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        .login-btn {
            background: #1e4d3b;
            color: white;
            margin-right: 5px;
        }
        .reg-btn {
            background: #f1c40f;
            color: #000;
        }
        .categories {
            display: flex;
            overflow-x: auto;
            padding: 12px;
            background: #0f382a;
            white-space: nowrap;
        }
        .cat-item {
            background: #144632;
            padding: 8px 16px;
            margin-right: 10px;
            border-radius: 20px;
            font-size: 13px;
            color: #fff;
            font-weight: bold;
            border: 1px solid #27ae60;
        }
        .cat-item.active {
            background: #27ae60;
        }
        .section-title {
            padding: 15px 15px 10px 15px;
            font-size: 16px;
            color: #f1c40f;
            font-weight: bold;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 0 10px;
        }
        .game-card {
            background: linear-gradient(145deg, #144632, #0d3223);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            border: 1px solid #1e563f;
            position: relative;
        }
        .game-card img {
            width: 100%;
            height: 70px;
            object-fit: cover;
            border-radius: 6px;
            background: #222;
        }
        .game-card h4 {
            margin: 6px 0 2px 0;
            font-size: 12px;
            color: #fff;
        }
        .game-card p {
            margin: 0;
            font-size: 9px;
            color: #2ecc71;
        }
        /* نیچے کا نیویگیشن بار */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #062319;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #144632;
            z-index: 1000;
        }
        .nav-item {
            text-align: center;
            color: #aaa;
            font-size: 11px;
            text-decoration: none;
        }
        .nav-item.active {
            color: #2ecc71;
        }
        .nav-item span {
            display: block;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">🌿 444.GAME</div>
        <div class="auth-btns">
            <button class="login-btn">Login</button>
            <button class="reg-btn">Register</button>
        </div>
    </div>

    <div class="categories">
        <div class="cat-item active">🔥 Hot</div>
        <div class="cat-item">🎰 Slot</div>
        <div class="cat-item">🚀 Aviator</div>
        <div class="cat-item">🃏 Cards</div>
        <div class="cat-item">🎣 Fishing</div>
    </div>

    <div class="section-title">🔥 Hot Games</div>

    <div class="grid">
        <div class="game-card">
            <div style="height:70px; background:#c0392b; border-radius:6px; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:12px;">AVIATOR</div>
            <h4>Aviator</h4>
            <p>Scribe</p>
        </div>
        <div class="game-card">
            <div style="height:70px; background:#d35400; border-radius:6px; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:11px;">CHICKEN</div>
            <h4>Chicken Road</h4>
            <p>Mini Game</p>
        </div>
        <div class="game-card">
            <div style="height:70px; background:#f39c12; border-radius:6px; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:11px;">FORTUNE</div>
            <h4>Fortune Gems</h4>
            <p>JILI Slot</p>
        </div>
        <div class="game-card">
            <div style="height:70px; background:#27ae60; border-radius:6px; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:11px;">MONEY</div>
            <h4>Money Coming</h4>
            <p>JILI Slot</p>
        </div>
        <div class="game-card">
            <div style="height:70px; background:#8e44ad; border-radius:6px; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:11px;">PIGGY</div>
            <h4>Piggy Bank</h4>
            <p>Slot Game</p>
        </div>
        <div class="game-card">
            <div style="height:70px; background:#2980b9; border-radius:6px; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:11px;">SEVEN</div>
            <h4>Super Slot</h4>
            <p>JILI Slot</p>
        </div>
    </div>

    <!-- نیچے کا پروفیشنل نیویگیشن بار -->
    <div class="bottom-nav">
        <a href="#" class="nav-item active"><span>🔍</span>Browse</a>
        <a href="#" class="nav-item"><span>🎰</span>Casino</a>
        <a href="#" class="nav-item"><span>🎁</span>Promo</a>
        <a href="#" class="nav-item"><span>🎧</span>Support</a>
        <a href="#" class="nav-item"><span>👤</span>Profile</a>
    </div>

</body>
</html>
