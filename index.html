<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Admin Panel - Demo</title>
    <style>
        body {
            background-color: #0b2e21;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .header {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #2ecc71;
        }
        .card {
            background: #144632;
            padding: 15px;
            margin: 10px auto;
            width: 90%;
            max-w: 400px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .btn {
            background-color: #27ae60;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="header">🎮 Game Platform Demo</div>

    <div class="card">
        <h3>Aviator Game</h3>
        <p>مایاں اور کریش گیم کا مزہ لیں</p>
        <a href="#" class="btn">Play Now</a>
    </div>

    <div class="card">
        <h3>Admin Control Panel</h3>
        <p>یوزرز اور ون/لاس کنٹرول کرنے کے لیے</p>
        <a href="admin.html" class="btn" style="background-color: #e67e22;">Admin Login</a>
    </div>

</body>
</html>
