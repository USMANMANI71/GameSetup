<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: Arial, sans-serif;
            padding: 20px;
            text-align: center;
        }
        .panel {
            background: #2c2c2c;
            padding: 20px;
            border-radius: 8px;
            max-width: 400px;
            margin: auto;
        }
        select, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: none;
        }
        button {
            background-color: #e74c3c;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="panel">
        <h2>🔒 Admin Control Dashboard</h2>
        <p>گیم رزلٹ کنٹرول پینل</p>
        
        <label>یوزر کا انتخاب کریں:</label>
        <select>
            <option>User_123 (Balance: 500)</option>
            <option>User_99 (Balance: 1200)</option>
        </select>

        <label>رزلٹ سیٹ کریں:</label>
        <select id="control">
            <option value="win">زبردستی جتوانا (Win)</option>
            <option value="loss">ہرانا (Loss)</option>
            <option value="random">رینڈم (Normal)</option>
        </select>

        <button onclick="alert('Settings Updated!')">سیٹنگز محفوظ کریں</button>
    </div>

</body>
</html>
