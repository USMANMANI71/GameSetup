<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box, .panel {
            background: #2c2c2c;
            padding: 25px;
            border-radius: 8px;
            width: 300px;
            text-align: center;
        }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 12px;
            border-radius: 5px;
            border: none;
            box-sizing: border-box;
        }
        button {
            background-color: #27ae60;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .panel {
            display: none;
        }
    </style>
</head>
<body>

    <!-- لاگ ان باکس -->
    <div class="login-box" id="loginBox">
        <h3>🔐 Admin Login</h3>
        <input type="password" id="passInput" placeholder="پاس ورڈ درج کریں">
        <button onclick="checkPassword()">لاگ ان کریں</button>
    </div>

    <!-- اصلی ایڈمن ڈیش بورڈ -->
    <div class="panel" id="adminPanel">
        <h2>⚡ Control Dashboard</h2>
        <label>یوزر سلیکٹ کریں:</label>
        <select>
            <option>Usman (Balance: 5000)</option>
            <option>Player_99 (Balance: 200)</option>
        </select>

        <label>کنٹرول موڈ:</label>
        <select>
            <option>زبردستی ون کروائیں (Win)</option>
            <option>ہرائیں (Loss)</option>
            <option>نارمل رینڈم (Normal)</option>
        </select>

        <button style="background: #e74c3c;" onclick="alert('Saved Successfully!')">اپڈیٹ کریں</button>
    </div>

<script>
    function checkPassword() {
        var pass = document.getElementById("passInput").value;
        // یہاں اپنا مرضی کا پاس ورڈ رکھ سکتے ہو، فی الحال 'admin123' ہے
        if(pass === "admin123") {
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("adminPanel").style.display = "block";
        } else {
            alert("غلط پاس ورڈ!");
        }
    }
</script>

</body>
</html>
